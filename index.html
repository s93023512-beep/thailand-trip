<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🇹🇭 泰國之旅 · Kevin & Ariel</title>
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #FFF8EE;
    --cream2: #FFF0D6;
    --cream3: #FFE8C0;
    --orange: #E8843A;
    --orange-dark: #C46828;
    --orange-light: #F4A96A;
    --brown: #5C3317;
    --brown2: #7A4A22;
    --brown3: #9E6035;
    --text: #3A1F08;
    --text2: #7A4A22;
    --text3: #B07848;
    --border: rgba(92,51,23,0.15);
    --border2: rgba(92,51,23,0.08);
    --green: #3A7D44;
    --red: #C0392B;
    --blue: #2471A3;
    --purple: #6C3483;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Noto Sans TC', sans-serif;
    background: var(--cream);
    color: var(--text);
    min-height: 100vh;
  }
  body::before {
    content: '';
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse at 0% 0%, rgba(232,132,58,0.12) 0%, transparent 55%),
      radial-gradient(ellipse at 100% 100%, rgba(232,132,58,0.10) 0%, transparent 55%);
    pointer-events: none; z-index: 0;
  }
  .app { position: relative; z-index: 1; max-width: 920px; margin: 0 auto; padding: 0 1.25rem 5rem; }

  .header {
    padding: 2.5rem 0 1.75rem;
    border-bottom: 1.5px solid var(--border);
    margin-bottom: 1.75rem;
  }
  .trip-label { font-family: 'Kanit', sans-serif; font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--orange); margin-bottom: 6px; }
  .trip-title { font-family: 'Kanit', sans-serif; font-size: clamp(30px, 5vw, 44px); font-weight: 600; color: var(--brown); line-height: 1; display: flex; align-items: center; gap: 12px; }
  .trip-dates { font-size: 13px; color: var(--text2); margin-top: 10px; display: flex; gap: 18px; flex-wrap: wrap; }

  .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; margin-bottom: 1.5rem; }
  .stat { background: white; border: 1.5px solid var(--border); border-radius: 14px; padding: 1.25rem 1.4rem; box-shadow: 0 2px 8px rgba(92,51,23,0.06); }
  .stat-label { font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text3); margin-bottom: 6px; }
  .stat-value { font-family: 'Kanit', sans-serif; font-size: 26px; font-weight: 600; color: var(--orange-dark); line-height: 1; }
  .stat-sub { font-size: 11px; color: var(--text3); margin-top: 4px; }

  .sync-bar { display: flex; align-items: center; justify-content: space-between; background: white; border: 1.5px solid var(--border); border-radius: 10px; padding: 10px 16px; margin-bottom: 1.5rem; font-size: 12px; flex-wrap: wrap; gap: 8px; box-shadow: 0 1px 4px rgba(92,51,23,0.05); }
  .sync-left { display: flex; align-items: center; gap: 8px; color: var(--text2); }
  .sync-dot { width: 8px; height: 8px; border-radius: 50%; background: #27AE60; box-shadow: 0 0 6px #27AE60; animation: pulse 2s infinite; flex-shrink: 0; }
  .sync-dot.offline { background: #E74C3C; box-shadow: 0 0 6px #E74C3C; animation: none; }
  .sync-dot.connecting { background: var(--orange); box-shadow: 0 0 6px var(--orange); }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  .sync-text { color: var(--text2); }
  .share-btn { font-size: 12px; padding: 6px 14px; border: 1.5px solid var(--orange); border-radius: 8px; cursor: pointer; background: transparent; color: var(--orange-dark); transition: all 0.2s; font-family: 'Noto Sans TC', sans-serif; font-weight: 500; }
  .share-btn:hover { background: var(--orange); color: white; }

  .tabs { display: flex; margin-bottom: 1.5rem; border-bottom: 1.5px solid var(--border); }
  .tab { font-family: 'Kanit', sans-serif; font-size: 15px; padding: 10px 22px; cursor: pointer; border: none; background: none; color: var(--text3); border-bottom: 2.5px solid transparent; margin-bottom: -1.5px; transition: all 0.2s; letter-spacing: 0.04em; }
  .tab.active { color: var(--orange-dark); border-bottom-color: var(--orange); }
  .tab:hover:not(.active) { color: var(--brown2); }
  .panel { display: none; }
  .panel.active { display: block; }

  .add-form { background: white; border: 1.5px solid var(--border); border-radius: 14px; padding: 1.25rem 1.4rem; margin-bottom: 1.5rem; box-shadow: 0 2px 8px rgba(92,51,23,0.05); }
  .form-title { font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text3); margin-bottom: 12px; font-weight: 500; }
  .form-row { display: flex; gap: 8px; flex-wrap: wrap; }
  .form-row input, .form-row select { font-family: 'Noto Sans TC', sans-serif; font-size: 13px; padding: 8px 12px; background: var(--cream); color: var(--text); border: 1.5px solid var(--border); border-radius: 9px; outline: none; transition: border-color 0.2s; }
  .form-row input:focus, .form-row select:focus { border-color: var(--orange); background: white; }
  .form-row input::placeholder { color: var(--text3); }
  .fi { flex: 1; min-width: 130px; }
  .fw { width: 95px; }
  .fs { width: 115px; }
  .fd { width: 105px; }
  .btn-submit { font-family: 'Kanit', sans-serif; font-size: 13px; padding: 8px 20px; background: var(--orange); color: white; border: none; border-radius: 9px; cursor: pointer; font-weight: 500; transition: all 0.2s; letter-spacing: 0.04em; white-space: nowrap; box-shadow: 0 2px 6px rgba(232,132,58,0.3); }
  .btn-submit:hover { background: var(--orange-dark); transform: translateY(-1px); }
  .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

  .cur-toggle { display: flex; gap: 4px; align-items: center; margin-bottom: 1rem; }
  .cur-label { font-size: 11px; color: var(--text3); margin-right: 4px; }
  .cur-btn { font-size: 11px; padding: 4px 11px; border-radius: 7px; border: 1.5px solid var(--border); cursor: pointer; background: transparent; color: var(--text3); font-family: 'Noto Sans TC', sans-serif; transition: all 0.2s; }
  .cur-btn.active { background: var(--orange); color: white; border-color: var(--orange); }

  .section-label { font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text3); margin-bottom: 10px; font-weight: 500; }
  .items { display: flex; flex-direction: column; gap: 7px; }
  .item { background: white; border: 1.5px solid var(--border); border-radius: 12px; padding: 12px 16px; display: flex; align-items: center; gap: 12px; transition: all 0.2s; animation: fadeIn 0.25s ease; box-shadow: 0 1px 4px rgba(92,51,23,0.04); }
  @keyframes fadeIn { from{opacity:0;transform:translateY(-5px)} to{opacity:1;transform:none} }
  .item:hover { border-color: var(--orange-light); box-shadow: 0 3px 10px rgba(232,132,58,0.1); }
  .item-left { flex: 1; min-width: 0; }
  .item-name { font-size: 14px; color: var(--text); font-weight: 500; }
  .item-meta { font-size: 11px; color: var(--text3); margin-top: 4px; display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .item-right { display: flex; align-items: center; gap: 10px; }
  .item-amt { font-family: 'Kanit', sans-serif; font-size: 18px; font-weight: 600; color: var(--orange-dark); white-space: nowrap; }
  .item-del { background: none; border: none; cursor: pointer; color: var(--text3); font-size: 18px; line-height: 1; transition: color 0.2s; padding: 2px 4px; border-radius: 4px; }
  .item-del:hover { color: var(--red); background: #FDE8E8; }

  .badge { display: inline-block; font-size: 10px; padding: 2px 8px; border-radius: 99px; font-weight: 500; }
  .b-transport { background: #D6EAF8; color: var(--blue); }
  .b-hotel { background: #E8DAEF; color: var(--purple); }
  .b-food { background: #D5F5E3; color: var(--green); }
  .b-activity { background: #FDEBD0; color: var(--orange-dark); }
  .b-other { background: #F0EAE0; color: var(--brown3); }
  .who-badge { font-size: 10px; color: var(--brown2); background: var(--cream2); padding: 2px 8px; border-radius: 99px; border: 1px solid var(--border); }

  .day-group { margin-bottom: 1.5rem; }
  .day-label { font-family: 'Kanit', sans-serif; font-size: 12px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text3); margin-bottom: 8px; display: flex; align-items: center; gap: 8px; }
  .day-label::after { content:''; flex:1; height:1.5px; background: var(--border2); border-radius: 1px; }

  .place { background: white; border: 1.5px solid var(--border); border-radius: 12px; padding: 12px 16px; display: flex; align-items: flex-start; gap: 12px; transition: all 0.2s; animation: fadeIn 0.25s ease; margin-bottom: 7px; box-shadow: 0 1px 4px rgba(92,51,23,0.04); }
  .place:hover { border-color: var(--orange-light); box-shadow: 0 3px 10px rgba(232,132,58,0.1); }
  .place-check { width: 22px; height: 22px; border-radius: 50%; border: 2px solid var(--border); cursor: pointer; flex-shrink: 0; margin-top: 1px; display: flex; align-items: center; justify-content: center; transition: all 0.2s; background: white; }
  .place-check:hover { border-color: var(--orange); }
  .place-check.done { background: var(--green); border-color: var(--green); }
  .place-check.done::after { content:'✓'; font-size: 12px; color: white; font-weight: 600; }
  .place-body { flex: 1; }
  .place-name { font-size: 14px; font-weight: 500; color: var(--text); transition: all 0.2s; }
  .place-name.done { text-decoration: line-through; color: var(--text3); }
  .place-info { font-size: 11px; color: var(--text3); margin-top: 4px; }
  .place-note { font-size: 11px; color: var(--orange-dark); font-style: italic; margin-top: 4px; background: var(--cream2); padding: 3px 8px; border-radius: 6px; display: inline-block; }

  .empty { text-align: center; padding: 3rem 1rem; color: var(--text3); font-size: 13px; line-height: 2; }
  .empty-icon { font-size: 2.5rem; display: block; margin-bottom: 8px; }

  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(60,30,10,0.55); z-index: 100; align-items: center; justify-content: center; padding: 1rem; backdrop-filter: blur(4px); }
  .modal-overlay.open { display: flex; }
  .modal { background: white; border: 1.5px solid var(--border); border-radius: 18px; padding: 2rem; max-width: 420px; width: 100%; animation: fadeIn 0.2s ease; box-shadow: 0 20px 60px rgba(92,51,23,0.2); }
  .modal h3 { font-family: 'Kanit', sans-serif; font-size: 20px; color: var(--brown); margin-bottom: 8px; }
  .modal p { font-size: 13px; color: var(--text2); margin-bottom: 16px; line-height: 1.7; }
  .modal-url { font-size: 12px; background: var(--cream); border: 1.5px solid var(--border); border-radius: 9px; padding: 10px 12px; color: var(--text2); word-break: break-all; margin-bottom: 14px; font-family: 'Courier New', monospace; }
  .modal-btns { display: flex; gap: 8px; }
  .modal-btn { flex: 1; padding: 10px; border-radius: 9px; cursor: pointer; font-family: 'Kanit', sans-serif; font-size: 14px; font-weight: 500; border: 1.5px solid var(--border); transition: all 0.2s; }
  .modal-btn-primary { background: var(--orange); color: white; border-color: var(--orange); }
  .modal-btn-primary:hover { background: var(--orange-dark); }
  .modal-btn-secondary { background: transparent; color: var(--text2); }
  .modal-btn-secondary:hover { border-color: var(--text2); color: var(--text); }

  /* Edit modal */
  .edit-modal { max-width: 480px; }
  .edit-modal h3 { font-family: 'Kanit', sans-serif; font-size: 18px; color: var(--brown); margin-bottom: 16px; }
  .edit-field { margin-bottom: 12px; }
  .edit-label { font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text3); margin-bottom: 5px; font-weight: 500; }
  .edit-input { width: 100%; font-family: 'Noto Sans TC', sans-serif; font-size: 13px; padding: 9px 12px; background: var(--cream); color: var(--text); border: 1.5px solid var(--border); border-radius: 9px; outline: none; transition: border-color 0.2s; }
  .edit-input:focus { border-color: var(--orange); background: white; }
  .edit-row { display: flex; gap: 8px; }
  .edit-row .edit-field { flex: 1; }
  .item-edit { background: none; border: none; cursor: pointer; color: var(--text3); font-size: 14px; padding: 2px 6px; border-radius: 4px; transition: all 0.2s; }
  .item-edit:hover { color: var(--orange-dark); background: var(--cream2); }

  select option { background: white; }
  @media (max-width: 600px) {
    .fi,.fw,.fs,.fd { min-width: 100%; width: 100%; }
    .btn-submit { width: 100%; }
    .stat-value { font-size: 22px; }
  }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="trip-label">Travel Journal · 旅遊記帳</div>
    <div class="trip-title">🇹🇭 泰國之旅</div>
    <div class="trip-dates">
      <span>📅 6/18（三）— 6/23（一）</span>
      <span>🌙 6天5夜</span>
      <span>👥 2人同行</span>
    </div>
  </div>

  <div class="stats">
    <div class="stat"><div class="stat-label">總花費</div><div class="stat-value" id="s-total">฿0</div><div class="stat-sub" id="s-per">每人 ฿0</div></div>
    <div class="stat"><div class="stat-label">花費筆數</div><div class="stat-value" id="s-count">0</div><div class="stat-sub">筆記錄</div></div>
    <div class="stat"><div class="stat-label">最大支出</div><div class="stat-value" id="s-cat" style="font-size:18px;padding-top:4px;">—</div><div class="stat-sub" id="s-catamt"></div></div>
    <div class="stat"><div class="stat-label">景點進度</div><div class="stat-value" id="s-places">0</div><div class="stat-sub" id="s-placedone">個待造訪</div></div>
  </div>

  <div class="sync-bar">
    <div class="sync-left">
      <div class="sync-dot connecting" id="sync-dot"></div>
      <span class="sync-text" id="sync-text">連線中...</span>
    </div>
    <button class="share-btn" onclick="openShareModal()">🔗 分享給朋友</button>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('expense',this)">💰 花費記錄</button>
    <button class="tab" onclick="switchTab('places',this)">📍 景點清單</button>
  </div>

  <div id="panel-expense" class="panel active">
    <div class="cur-toggle">
      <span class="cur-label">顯示：</span>
      <button class="cur-btn active" id="cur-thb" onclick="setCur('THB')">฿ 泰銖</button>
      <button class="cur-btn" id="cur-twd" onclick="setCur('TWD')">NT$ 台幣</button>
    </div>
    <div class="add-form">
      <div class="form-title">新增花費</div>
      <div class="form-row">
        <input class="fi" type="text" id="e-name" placeholder="項目（如：機票、晚餐）" />
        <input class="fw" type="number" id="e-amt" placeholder="金額" min="0" />
        <select class="fs" id="e-cur"><option value="THB">฿ 泰銖</option><option value="TWD">NT$ 台幣</option></select>
        <select class="fs" id="e-cat">
          <option value="transport">✈ 交通</option>
          <option value="hotel">🏨 住宿</option>
          <option value="food">🍜 餐飲</option>
          <option value="activity">🎡 活動</option>
          <option value="other">📦 其他</option>
        </select>
        <select class="fs" id="e-who"><option value="共同">👥 共同</option><option value="Kevin">👤 Kevin</option><option value="Ariel">👤 Ariel</option></select>
        <input class="fd" type="text" id="e-day" placeholder="6/18" />
        <button class="btn-submit" id="btn-add-exp" onclick="addExpense()">＋ 新增</button>
      </div>
    </div>
    <div class="section-label">所有記錄</div>
    <div class="items" id="expense-list"><div class="empty"><span class="empty-icon">💸</span>載入中...</div></div>
  </div>

  <div id="panel-places" class="panel">
    <div class="add-form">
      <div class="form-title">新增景點</div>
      <div class="form-row">
        <input class="fi" type="text" id="p-name" placeholder="景點名稱" />
        <input class="fs" type="text" id="p-station" placeholder="地鐵站（如 Asok）" />
        <input class="fd" type="text" id="p-day" placeholder="日期 6/19" />
        <input class="fw" type="time" id="p-time" style="width:105px;" />
        <input class="fi" type="text" id="p-note" placeholder="備註（選填）" />
        <button class="btn-submit" id="btn-add-place" onclick="addPlace()">＋ 新增</button>
      </div>
    </div>
    <div id="place-list"><div class="empty"><span class="empty-icon">🗺️</span>載入中...</div></div>
  </div>
</div>

<div class="modal-overlay" id="modal" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <h3>🔗 分享給朋友</h3>
    <p>把下面的連結傳給你的朋友，打開就能一起記帳、查景點，資料即時同步！</p>
    <div class="modal-url" id="share-url"></div>
    <div class="modal-btns">
      <button class="modal-btn modal-btn-primary" id="copy-btn" onclick="copyUrl()">複製連結</button>
      <button class="modal-btn modal-btn-secondary" onclick="closeModal()">關閉</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="edit-modal" onclick="if(event.target===this)closeEditModal()">
  <div class="modal edit-modal">
    <h3>✏️ 編輯景點</h3>
    <input type="hidden" id="edit-key" />
    <div class="edit-field">
      <div class="edit-label">景點名稱</div>
      <input class="edit-input" type="text" id="edit-name" placeholder="景點名稱" />
    </div>
    <div class="edit-row">
      <div class="edit-field">
        <div class="edit-label">地鐵站</div>
        <input class="edit-input" type="text" id="edit-station" placeholder="如 Asok" />
      </div>
      <div class="edit-field">
        <div class="edit-label">日期</div>
        <input class="edit-input" type="text" id="edit-day" placeholder="6/19" />
      </div>
      <div class="edit-field">
        <div class="edit-label">時間（24hr）</div>
        <input class="edit-input" type="time" id="edit-time" />
      </div>
    </div>
    <div class="edit-field">
      <div class="edit-label">備註</div>
      <input class="edit-input" type="text" id="edit-note" placeholder="選填" />
    </div>
    <div class="modal-btns" style="margin-top:8px;">
      <button class="modal-btn modal-btn-primary" onclick="saveEditPlace()">儲存</button>
      <button class="modal-btn modal-btn-secondary" onclick="closeEditModal()">取消</button>
    </div>
  </div>
</div>


<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue, push, remove, update } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyAExwaaokfZTWgS-HDhx8MxRqlKik93UYw",
  authDomain: "thailand-trip-64cb7.firebaseapp.com",
  databaseURL: "https://thailand-trip-64cb7-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "thailand-trip-64cb7",
  storageBucket: "thailand-trip-64cb7.firebasestorage.app",
  messagingSenderId: "213810486904",
  appId: "1:213810486904:web:ef7f2536a722a98249d78d"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const THB_TWD = 1.008;
const catLabel = {transport:'交通',hotel:'住宿',food:'餐飲',activity:'活動',other:'其他'};
const catBadge = {transport:'b-transport',hotel:'b-hotel',food:'b-food',activity:'b-activity',other:'b-other'};
let displayCur = 'THB';
let expenses = {};
let places = {};

// ── Sync status ──
function setStatus(state) {
  const dot = document.getElementById('sync-dot');
  const txt = document.getElementById('sync-text');
  if (state === 'online') {
    dot.className = 'sync-dot';
    txt.textContent = '即時同步中 · 兩人共用';
  } else if (state === 'offline') {
    dot.className = 'sync-dot offline';
    txt.textContent = '連線失敗，請檢查網路';
  } else {
    dot.className = 'sync-dot connecting';
    txt.textContent = '連線中...';
  }
}

// ── Listen expenses ──
onValue(ref(db, 'expenses'), (snap) => {
  expenses = snap.val() || {};
  renderExpenses();
  updateStats();
  setStatus('online');
}, (err) => { setStatus('offline'); });

// ── Listen places ──
onValue(ref(db, 'places'), (snap) => {
  places = snap.val() || {};
  renderPlaces();
  updateStats();
});

// ── Currency ──
function toDisplay(amt, cur) {
  const inTHB = cur === 'THB' ? amt : amt / THB_TWD;
  return displayCur === 'THB' ? Math.round(inTHB).toLocaleString() : Math.round(inTHB * THB_TWD).toLocaleString();
}
function sym() { return displayCur === 'THB' ? '฿' : 'NT$'; }

window.setCur = function(c) {
  displayCur = c;
  document.getElementById('cur-thb').className = 'cur-btn' + (c==='THB'?' active':'');
  document.getElementById('cur-twd').className = 'cur-btn' + (c==='TWD'?' active':'');
  renderExpenses(); updateStats();
};

// ── Stats ──
function updateStats() {
  const expArr = Object.values(expenses);
  const totalTHB = expArr.reduce((s,e) => s + (e.cur==='THB' ? e.amt : e.amt/THB_TWD), 0);
  const total = displayCur==='THB' ? totalTHB : totalTHB * THB_TWD;
  document.getElementById('s-total').textContent = sym() + Math.round(total).toLocaleString();
  document.getElementById('s-per').textContent = '每人 ' + sym() + Math.round(total/2).toLocaleString();
  document.getElementById('s-count').textContent = expArr.length;
  const byCat = {};
  expArr.forEach(e => { if(!byCat[e.cat]) byCat[e.cat]=0; byCat[e.cat]+=(e.cur==='THB'?e.amt:e.amt/THB_TWD); });
  const top = Object.entries(byCat).sort((a,b)=>b[1]-a[1])[0];
  if (top) {
    document.getElementById('s-cat').textContent = catLabel[top[0]];
    document.getElementById('s-catamt').textContent = sym() + Math.round(displayCur==='THB'?top[1]:top[1]*THB_TWD).toLocaleString();
  } else {
    document.getElementById('s-cat').textContent = '—';
    document.getElementById('s-catamt').textContent = '';
  }
  const plArr = Object.values(places);
  document.getElementById('s-places').textContent = plArr.length;
  document.getElementById('s-placedone').textContent = plArr.filter(p=>p.done).length + ' 個已完成';
}

// ── Expenses ──
function renderExpenses() {
  const el = document.getElementById('expense-list');
  const arr = Object.entries(expenses).reverse();
  if (!arr.length) { el.innerHTML = '<div class="empty"><span class="empty-icon">💸</span>還沒有花費記錄<br>新增第一筆吧！</div>'; return; }
  el.innerHTML = arr.map(([key, e]) => `
    <div class="item">
      <div class="item-left">
        <div class="item-name">${e.name}</div>
        <div class="item-meta">
          <span class="badge ${catBadge[e.cat]}">${catLabel[e.cat]}</span>
          <span class="who-badge">${e.who}</span>
          ${e.day ? '<span>📅 '+e.day+'</span>' : ''}
          <span>原始：${e.cur==='THB'?'฿':'NT$'}${Number(e.amt).toLocaleString()}</span>
        </div>
      </div>
      <div class="item-right">
        <span class="item-amt">${sym()}${toDisplay(e.amt, e.cur)}</span>
        <button class="item-del" onclick="delExpense('${key}')">×</button>
      </div>
    </div>
  `).join('');
}

window.addExpense = function() {
  const name = document.getElementById('e-name').value.trim();
  const amt = parseFloat(document.getElementById('e-amt').value);
  if (!name || !amt) return;
  push(ref(db, 'expenses'), {
    name, amt,
    cur: document.getElementById('e-cur').value,
    cat: document.getElementById('e-cat').value,
    who: document.getElementById('e-who').value,
    day: document.getElementById('e-day').value.trim(),
    ts: Date.now()
  });
  ['e-name','e-amt','e-day'].forEach(id => document.getElementById(id).value='');
};

window.delExpense = function(key) {
  remove(ref(db, 'expenses/' + key));
};

// ── Places ──
function renderPlaces() {
  const el = document.getElementById('place-list');
  const arr = Object.entries(places);
  if (!arr.length) { el.innerHTML = '<div class="empty"><span class="empty-icon">🗺️</span>還沒有景點<br>加入想去的地方吧！</div>'; return; }
  const groups = {};
  arr.forEach(([key, p]) => {
    const k = p.day || '未指定日期';
    if (!groups[k]) groups[k] = [];
    groups[k].push({...p, key});
  });
  // Sort: 未指定 last, then by day, then by time within day
  const sorted = Object.entries(groups).sort(([a],[b]) => {
    if (a === '未指定日期') return 1;
    if (b === '未指定日期') return -1;
    return a.localeCompare(b);
  });
  el.innerHTML = sorted.map(([day, ps]) => {
    const psSorted = [...ps].sort((a,b) => (a.time||'').localeCompare(b.time||''));
    return `
    <div class="day-group">
      <div class="day-label">📅 ${day}</div>
      ${psSorted.map(p => `
        <div class="place">
          <div class="place-check ${p.done?'done':''}" onclick="togglePlace('${p.key}', ${!p.done})"></div>
          <div class="place-body">
            <div class="place-name ${p.done?'done':''}">${p.name}</div>
            <div class="place-info">
              ${p.time ? '<span>🕐 '+p.time+'</span> ' : ''}
              ${p.station ? '🚇 '+p.station : ''}
            </div>
            ${p.note ? '<div class="place-note">💬 '+p.note+'</div>' : ''}
          </div>
          <div style="display:flex;gap:4px;align-items:center;">
            <button class="item-edit" onclick="openEditPlace('${p.key}')" title="編輯">✏️</button>
            <button class="item-del" onclick="delPlace('${p.key}')">×</button>
          </div>
        </div>
      `).join('')}
    </div>`;
  }).join('');
}

window.addPlace = function() {
  const name = document.getElementById('p-name').value.trim();
  if (!name) return;
  push(ref(db, 'places'), {
    name,
    station: document.getElementById('p-station').value.trim(),
    day: document.getElementById('p-day').value.trim(),
    time: document.getElementById('p-time').value.trim(),
    note: document.getElementById('p-note').value.trim(),
    done: false, ts: Date.now()
  });
  ['p-name','p-station','p-day','p-time','p-note'].forEach(id => document.getElementById(id).value='');
};

window.togglePlace = function(key, val) {
  update(ref(db, 'places/' + key), { done: val });
};

window.delPlace = function(key) {
  remove(ref(db, 'places/' + key));
};

window.openEditPlace = function(key) {
  const p = places[key];
  if (!p) return;
  document.getElementById('edit-key').value = key;
  document.getElementById('edit-name').value = p.name || '';
  document.getElementById('edit-station').value = p.station || p.city || '';
  document.getElementById('edit-day').value = p.day || '';
  document.getElementById('edit-time').value = p.time || '';
  document.getElementById('edit-note').value = p.note || '';
  document.getElementById('edit-modal').classList.add('open');
};

window.saveEditPlace = function() {
  const key = document.getElementById('edit-key').value;
  const name = document.getElementById('edit-name').value.trim();
  if (!name) return;
  update(ref(db, 'places/' + key), {
    name,
    station: document.getElementById('edit-station').value.trim(),
    day: document.getElementById('edit-day').value.trim(),
    time: document.getElementById('edit-time').value.trim(),
    note: document.getElementById('edit-note').value.trim(),
  });
  closeEditModal();
};

window.closeEditModal = function() {
  document.getElementById('edit-modal').classList.remove('open');
};

// ── Tab ──
window.switchTab = function(t, btn) {
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('panel-'+t).classList.add('active');
};

// ── Modal ──
const shareUrl = window.location.href;
document.getElementById('share-url').textContent = shareUrl;

window.openShareModal = function() {
  document.getElementById('modal').classList.add('open');
};
window.closeModal = function() {
  document.getElementById('modal').classList.remove('open');
};
window.copyUrl = function() {
  navigator.clipboard.writeText(shareUrl).then(() => {
    const btn = document.getElementById('copy-btn');
    btn.textContent = '✓ 已複製！';
    setTimeout(() => btn.textContent='複製連結', 2000);
  });
};

</script>
</body>
